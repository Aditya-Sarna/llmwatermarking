services:
  - type: web
    name: llmwatermarking-api
    runtime: python
    rootDir: backend
    buildCommand: >
      pip install --upgrade pip &&
      pip install torch --index-url https://download.pytorch.org/whl/cpu &&
      pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://llmwatermarking.netlify.app
      - key: TRANSFORMERS_CACHE
        value: /tmp/hf_cache
      - key: HF_HOME
        value: /tmp/hf_cache
    plan: starter   # 512 MB RAM — enough for SmolLM2-135M on CPU
